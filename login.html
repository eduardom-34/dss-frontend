 
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Vulnerable Lab</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Acceso</h2>
        <form id="loginForm">
            <label>Usuario:</label><br>
            <input type="text" id="username" name="username"><br><br>
            <label>Contraseña:</label><br>
            <input type="text" id="password" name="password"><br><br>
            <button type="submit">Entrar</button>
        </form>
        <h3 id="resultado"></h3>
        <p style="color: gray; font-family: monospace;" id="queryDebug"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const response = await fetch('http://localhost:5065/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: user, Password: pass })
            });

            if (response.ok) {
                window.location.href = 'success.html';
            } else {
                document.getElementById('resultado').innerText = "Contraseña incorrecta";
                document.getElementById('resultado').style.color = "red";
                document.getElementById('queryDebug').innerText = "";
            }
        });
    </script>
</body>
</html>
